<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <main class="app-shell" id="app-shell">
        <div class="voice-wave" id="voice-wave" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="agent-container">
            <section id="agent-card" class="agent-card">
                <div>
                    <h1>Voice Agent</h1>
                    <p class="subtitle">Choose Agent Configuration.</p>
                    <button id="collapse-toggle" class="collapse-toggle" type="button" aria-expanded="false">Collapse Card</button>
                </div>

                <div class="controls">
                    <label class="field">
                        <span>Language</span>
                        <select id="language-select">
                            <option value="ar">Arabic</option>
                            <option value="en" selected>English</option>
                            <option value="ja">Japanese</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Mode</span>
                        <select id="mode-select">
                            <option value="general" selected>General</option>
                            <option value="weeb">Weeb</option>
                            <option value="support">Customer Support</option>
                        </select>
                    </label>

                    <button id="start-btn" type="button">Start Conversation</button>
                </div>

                <div class="status-panel" id="status-panel" aria-live="polite">
                    <div class="status-top">
                        <span class="indicator"></span>
                        <strong id="status-text">Idle</strong>
                    </div>
                    <p id="status-message">Ready when you are.</p>
                </div>
            </section>
            <section id="update-form">
                <strong>Update Account</strong>
                <input type="email" class='email' id='email' placeholder="New Email">
                <input type="tel" class='phone' id='phone' placeholder="New Phone Number">
                <input type="text" class='password active' id="password" placeholder="New Password">
                <button>submit</button>
            </section>
            <section id="payment-form">
                <button>Checkout Payment</button>
            </section>
        </div>
    </main>
    <section id="customer-support" class="customer-support" aria-live="polite">
        <div class="support-shell">
            <div class="support-header">
                <h2>Customer Support Dashboard</h2>
                <p>Select an account to inspect products, orders, payments, requests, and complaints.</p>
            </div>

            <label class="support-field">
                <span>Account</span>
                <select id="account-select">
                    <option value="">Choose an account</option>
                    <option value="ACC-100001">Ava Martin | ava.martin@example.com</option>
                    <option value="ACC-100002">Liam Johnson | liam.johnson@example.com</option>
                    <option value="ACC-100003">Mia Chen | mia.chen@example.com</option>
                    <option value="ACC-100004">Noah Patel | noah.patel@example.com</option>
                    <option value="ACC-100005">Sophia Nguyer | sophia.nguyer@example.com</option>
                </select>
            </label>

            <div id="support-tabs" class="support-tabs" role="tablist" aria-label="Customer support tabs">
                <button type="button" class="support-tab active" data-tab="products">Products</button>
                <button type="button" class="support-tab" data-tab="orders">Orders</button>
                <button type="button" class="support-tab" data-tab="payments">Payments</button>
                <button type="button" class="support-tab" data-tab="requests">Requests</button>
                <button type="button" class="support-tab" data-tab="complaints">Complaints</button>
            </div>

            <div id="support-content" class="support-content">
                <p class="support-placeholder">Choose an account to start exploring support data.</p>
            </div>
        </div>
    </section>
    <script type="module" src="static/main.js" defer></script>
</body>
</html>
